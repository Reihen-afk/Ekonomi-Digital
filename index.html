    @keyframes fadeUp { from { opacity:0; transform: translateY(28px);} to { opacity:1; transform: translateY(0);} }
    @keyframes floatSlow { 0%,100% { transform: translateY(0)} 50% { transform: translateY(-18px)} }
    @keyframes pulseGlow { 0%,100% { opacity:.5; transform: scale(1)} 50% { opacity:.85; transform: scale(1.08)} }
    @keyframes scaleIn { from { opacity:0; transform: scale(.94)} to { opacity:1; transform: scale(1)} }
    @keyframes shimmer { 100% { transform: translateX(100%)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

    .anim-fadeUp { opacity:0; animation: fadeUp .8s cubic-bezier(.16,1,.3,1) forwards; }
    .anim-scaleIn { animation: scaleIn .45s cubic-bezier(.16,1,.3,1) forwards; }
    .blob { animation: floatSlow 9s ease-in-out infinite; }
    .glow { animation: pulseGlow 6s ease-in-out infinite; }
    .shake { animation: shake .4s ease; }

    .d1{animation-delay:.1s}.d2{animation-delay:.25s}.d3{animation-delay:.4s}
    .d4{animation-delay:.55s}.d5{animation-delay:.7s}.d6{animation-delay:.85s}

    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%); border: 1px solid rgba(255,255,255,0.6); }
    .glass-dark { background: rgba(10,31,60,0.55); backdrop-filter: blur(14px) saturate(140%); border: 1px solid rgba(45,212,191,0.18); }

    .module-card { transition: transform .4s cubic-bezier(.16,1,.3,1), box-shadow .4s ease, border-color .4s ease; }
    .module-card:hover { transform: translateY(-8px); box-shadow: 0 28px 60px -24px rgba(10,31,60,.45); }
    .module-card:hover .mod-icon { transform: scale(1.08) rotate(-4deg); }
    .module-card:hover .mod-arrow { transform: translateX(6px); opacity:1; }
    .mod-icon { transition: transform .45s cubic-bezier(.16,1,.3,1); }
    .mod-arrow { transition: transform .35s ease, opacity .35s ease; }

    .btn-shimmer { position: relative; overflow: hidden; }
    .btn-shimmer::after { content:""; position:absolute; top:0; left:-100%; width:100%; height:100%; background: linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent); }
    .btn-shimmer:hover::after { animation: shimmer 1s ease; }

    .quiz-opt { transition: all .25s ease; }
    .quiz-opt:hover:not(:disabled) { transform: translateX(4px); }

    .nice-scroll::-webkit-scrollbar { width: 8px; }
    .nice-scroll::-webkit-scrollbar-thumb { background: rgba(20,184,166,.4); border-radius: 99px; }

    /* range slider */
    input[type=range].slider { -webkit-appearance:none; appearance:none; height:8px; border-radius:99px; background:#D8E2EC; outline:none; }
    input[type=range].slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#14B8A6; border:3px solid #fff; box-shadow:0 2px 8px rgba(20,184,166,.5); cursor:pointer; transition:transform .15s; }

    input[type=range].slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:#14B8A6; border:3px solid #fff; cursor:pointer; }

    .num-input { transition: border-color .2s, box-shadow .2s; }
    .num-input:focus { border-color:#14B8A6; box-shadow:0 0 0 4px rgba(20,184,166,.12); outline:none; }

    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation:none !important; transition:none !important; } }

      useEffect(() => {

        return () => o.disconnect();
      }, []);
      return (

    function parseYouTube(url) {
      if (!url) return null;
      url = url.trim();
      if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
      let m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    /* ================= Curve Studio (slider) ================= */
    function CurveStudio() {
      const [dem, setDem] = useState(0);
      const [sup, setSup] = useState(0);
      const ref = useRef(null);
      const a = 360 + dem*2, b = 0.9, c = 60 - sup*2, d = 0.9;
      let Q = (a-c)/(b+d); let P = a-b*Q;
      Q = Math.max(0, Math.min(400, Q)); P = Math.max(0, Math.min(400, P));
      const priceRp = Math.round(P*250);
      let status = 'Seimbang', stColor = 'text-navy-800';
      if (dem>10){status='Permintaan tinggi 📈';stColor='text-emerald';} else if (dem<-10){status='Permintaan turun 📉';stColor='text-red-500';}
      else if (sup>10){status='Banyak penjual 🏪';stColor='text-teal-deep';} else if (sup<-10){status='Penjual sedikit ⚠️';stColor='text-gold';}
      useEffect(() => {
        const cv = ref.current; if (!cv) return;
        const ctx = cv.getContext('2d'); const W=cv.width, H=cv.height, m=54;
        ctx.clearRect(0,0,W,H);
        ctx.strokeStyle='#EAF0F6'; ctx.lineWidth=1;
        for (let i=1;i<8;i++){ const x=m+(i/8)*(W-2*m); ctx.beginPath(); ctx.moveTo(x,m); ctx.lineTo(x,H-m); ctx.stroke(); const y=m+(i/8)*(H-2*m); ctx.beginPath(); ctx.moveTo(m,y); ctx.lineTo(W-m,y); ctx.stroke(); }
        ctx.strokeStyle='#94A3B8'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(m,m); ctx.lineTo(m,H-m); ctx.lineTo(W-m,H-m); ctx.stroke();
        ctx.fillStyle='#64748B'; ctx.font='600 13px Inter,sans-serif';
        ctx.fillText('Harga (P)', m-40, m-16); ctx.fillText('Jumlah (Q)', W-m-66, H-m+32);
        const x2=q=>m+(q/400)*(W-2*m), y2=p=>H-m-(p/400)*(H-2*m);
        ctx.strokeStyle='#14B8A6'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.moveTo(x2(0),y2(a)); ctx.lineTo(x2(400),y2(a-b*400)); ctx.stroke();
        ctx.fillStyle='#14B8A6'; ctx.fillText('Permintaan', x2(300), y2(a-b*300)-10);
        ctx.strokeStyle='#0A1F3C'; ctx.beginPath(); ctx.moveTo(x2(0),y2(c)); ctx.lineTo(x2(400),y2(c+d*400)); ctx.stroke();
        ctx.fillStyle='#0A1F3C'; ctx.fillText('Penawaran', x2(280), y2(c+d*280)+22);
        ctx.setLineDash([5,6]); ctx.strokeStyle='#E2B85C'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(m,y2(P)); ctx.lineTo(x2(Q),y2(P)); ctx.lineTo(x2(Q),H-m); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='#E2B85C'; ctx.beginPath(); ctx.arc(x2(Q),y2(P),8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x2(Q),y2(P),3,0,Math.PI*2); ctx.fill();
      }, [dem, sup]);
      return (
        <Reveal>
          <div className="rounded-3xl bg-white ring-1 ring-navy-900/5 shadow-xl shadow-navy-900/[0.05] overflow-hidden">
            <div className="bg-gradient-to-r from-teal to-emerald px-7 py-5 text-navy-950 flex items-center gap-3">
              <div className="grid h-11 w-11 place-items-center rounded-xl bg-navy-950/15"><Icon name="chart" size={24} stroke={2.2}/></div>
              <div><h3 className="font-display text-xl font-extrabold">Curve Studio</h3><p className="text-sm font-medium opacity-80">Simulasi keseimbangan pasar digital</p></div>
            </div>
            <div className="grid md:grid-cols-5 gap-6 p-7">
              <div className="md:col-span-3">
                <canvas ref={ref} width="640" height="430" className="w-full rounded-2xl bg-[#FBFDFF] ring-1 ring-navy-900/5"></canvas>
                <p className="mt-3 text-center text-xs text-navy-800/50">Geser slider untuk melihat titik keseimbangan ⬤ bergerak.</p>
              </div>
              <div className="md:col-span-2">
                <div className="space-y-5">
                  <div>
                    <div className="flex justify-between text-sm font-semibold text-navy-900"><span>Selera konsumen</span><span className="text-teal-deep">{dem>0?'+':''}{dem}</span></div>
                    <input type="range" min="-40" max="40" value={dem} onChange={e=>setDem(+e.target.value)} className="slider w-full mt-2"/>
                  </div>
                  <div>
                    <div className="flex justify-between text-sm font-semibold text-navy-900"><span>Jumlah penjual</span><span className="text-teal-deep">{sup>0?'+':''}{sup}</span></div>
                    <input type="range" min="-40" max="40" value={sup} onChange={e=>setSup(+e.target.value)} className="slider w-full mt-2"/>
                  </div>
                </div>
                <div className="mt-6 space-y-2">
                  <div className="flex justify-between border-b border-dashed border-navy-900/10 py-2 text-sm"><span className="text-navy-800/60">Harga keseimbangan</span><b className="text-navy-900">{rupiah(priceRp)}</b></div>
                  <div className="flex justify-between border-b border-dashed border-navy-900/10 py-2 text-sm"><span className="text-navy-800/60">Jumlah keseimbangan</span><b className="text-navy-900">{Math.round(Q)} unit</b></div>
                  <div className="flex justify-between py-2 text-sm"><span className="text-navy-800/60">Status pasar</span><b className={stColor}>{status}</b></div>
                </div>
                <div className="mt-4 flex items-start gap-2.5 rounded-xl bg-teal/10 px-4 py-3 text-sm text-navy-900">
                  <Icon name="bulb" size={18} className="text-teal-deep shrink-0 mt-0.5"/><span>Permintaan naik → harga & jumlah naik. Penjual bertambah → harga turun, jumlah naik.</span>
                </div>
              </div>
            </div>
          </div>
        </Reveal>
      );
    }

        <div>
          <label className="block text-sm font-semibold text-navy-900 mb-1.5">{label}</label>
          <div className="relative">
            {prefix && <span className="absolute left-3 top-1/2 -translate-y-1/2 text-sm text-navy-800/40">{prefix}</span>}
            <input type="number" value={value} onChange={e=>set(e.target.value===''?0:+e.target.value)} className={'num-input w-full rounded-xl border border-navy-900/15 bg-white py-2.5 text-sm text-navy-900 '+(prefix?'pl-9 pr-3':'px-3')}/>
          </div>
        </div>
      );
    }
    function MarketSim() {
      const [price,setPrice]=useState(75000),[cost,setCost]=useState(40000),[fixed,setFixed]=useState(500000),[ads,setAds]=useState(300000),[qty,setQty]=useState(60);
      const rev=price*qty, totCost=cost*qty+fixed+ads, profit=rev-totCost, margin=price-cost;
      const bep = margin>0 ? Math.ceil((fixed+ads)/margin) : null;
      const win = profit>=0;
      let tip;
      if (margin<=0) tip='⚠️ Harga jual ≤ biaya produksi! Rugi tiap unit. Naikkan harga atau tekan biaya.';
      else if (profit<0) tip='📉 Masih rugi. Jual minimal '+bep+' unit agar balik modal (BEP).';
      else tip='✅ Untung! Tiap unit di atas BEP menambah laba '+rupiah(margin)+'.';
      return (
        <Reveal delay={0.1}>
          <div className="rounded-3xl bg-white ring-1 ring-navy-900/5 shadow-xl shadow-navy-900/[0.05] overflow-hidden">
            <div className="bg-gradient-to-r from-navy-900 to-navy-800 px-7 py-5 text-white flex items-center gap-3">
              <div className="grid h-11 w-11 place-items-center rounded-xl bg-white/10"><Icon name="calc" size={24} stroke={2.2}/></div>
              <div><h3 className="font-display text-xl font-extrabold">Real Market</h3><p className="text-sm font-medium text-white/70">Kalkulator untung-rugi toko online</p></div>
            </div>
            <div className="grid md:grid-cols-2 gap-7 p-7">
              <div className="space-y-3.5">
                <span className="inline-block rounded-full bg-teal/10 text-teal-deep text-xs font-bold uppercase tracking-wide px-3 py-1">Atur Tokomu</span>
                <Field label="Harga jual / unit" value={price} set={setPrice} prefix="Rp"/>
                <Field label="Biaya produksi / unit" value={cost} set={setCost} prefix="Rp"/>
                <Field label="Biaya tetap / bulan (sewa, internet)" value={fixed} set={setFixed} prefix="Rp"/>
                <Field label="Biaya iklan digital / bulan" value={ads} set={setAds} prefix="Rp"/>
                <Field label="Perkiraan unit terjual / bulan" value={qty} set={setQty}/>
              </div>
              <div>
                <span className="inline-block rounded-full bg-teal/10 text-teal-deep text-xs font-bold uppercase tracking-wide px-3 py-1">Laporan Usaha</span>
                <div className={'mt-3 rounded-2xl p-6 text-white shadow-lg transition-colors '+(win?'bg-gradient-to-br from-emerald to-teal':'bg-gradient-to-br from-red-500 to-rose-600')}>
                  <div className="text-sm opacity-80">Laba / Rugi bulan ini</div>
                  <div className="font-display text-3xl font-extrabold mt-1">{rupiah(profit)}</div>
                  <div className="mt-4 space-y-1.5">
                    {[['Total pendapatan',rupiah(rev)],['Total biaya',rupiah(totCost)],['Laba per unit',rupiah(margin)],['Titik impas (BEP)',bep?bep+' unit':'∞']].map(([k,v],i)=>(
                      <div key={i} className="flex justify-between border-b border-white/20 py-1.5 text-sm"><span className="opacity-85">{k}</span><span className="font-semibold">{v}</span></div>
                    ))}
                  </div>
                </div>
                <div className="mt-4 flex items-start gap-2.5 rounded-xl bg-gold/10 border-l-4 border-gold px-4 py-3 text-sm text-navy-900"><Icon name="bulb" size={18} className="text-gold shrink-0 mt-0.5"/><span>{tip}</span></div>
              </div>
            </div>
          </div>
        </Reveal>
      );
    }

    function Simulasi() {
      return (
        <section id="simulasi" className="relative mx-auto max-w-6xl px-5 py-24 scroll-mt-20">
          <SectionHead pill="Area Simulasi" pillIcon="gauge" title="Belajar Sambil Mencoba"
            sub="Dua alat interaktif: geser slider untuk memahami keseimbangan pasar, lalu hitung untung-rugi toko online-mu sendiri." />
          <div className="mt-14 space-y-8">
            <CurveStudio />
            <MarketSim />
          </div>
        </section>
      );
    }

    /* ================= Kuis ================= */
    function QuizGame() {
      const [qi,setQi]=useState(0),[score,setScore]=useState(0),[picked,setPicked]=useState(null),[done,setDone]=useState(false);
      const it = QUIZ_BANK[qi];
      const pick = (i) => { if (picked!==null) return; setPicked(i); if (i===it.a) setScore(s=>s+1); };
      const next = () => { if (qi+1<QUIZ_BANK.length){ setQi(qi+1); setPicked(null);} else setDone(true); };
      const restart = () => { setQi(0); setScore(0); setPicked(null); setDone(false); };
      if (done) {
        const pct = score/QUIZ_BANK.length;
        const msg = pct===1?'Luar biasa! Kamu menguasai materi. 🌟':pct>=0.6?'Bagus! Sedikit lagi sempurna. 👍':'Terus belajar, baca lagi materinya ya. 💪';
        return (
          <div className="text-center py-6 anim-scaleIn">
            <div className="mx-auto grid h-20 w-20 place-items-center rounded-2xl bg-gradient-to-br from-gold to-teal text-navy-950 shadow-lg"><Icon name="award" size={40} stroke={2}/></div>
            <h3 className="mt-5 font-display text-2xl font-extrabold text-navy-900">Skor kamu: {score} / {QUIZ_BANK.length}</h3>
            <p className="mt-2 text-navy-800/60">{msg}</p>
            <button onClick={restart} className="mt-6 cursor-pointer inline-flex items-center gap-2 rounded-full bg-navy-900 px-6 py-3 font-display font-bold text-white hover:bg-navy-800 transition"><Icon name="rotate" size={18} stroke={2.3}/> Ulangi Kuis</button>
          </div>
        );
      }
      return (
        <div>
          <div className="flex items-center justify-between text-sm font-semibold text-navy-800/60"><span>Soal {qi+1} dari {QUIZ_BANK.length}</span><span className="text-teal-deep">Skor {score}</span></div>
          <div className="mt-2 h-2.5 rounded-full bg-navy-900/10 overflow-hidden"><div className="h-full bg-gradient-to-r from-teal to-emerald transition-all duration-500" style={{width:((qi)/QUIZ_BANK.length*100)+'%'}}></div></div>
          <p className="mt-6 font-display text-xl font-bold text-navy-900 leading-snug">{it.q}</p>
          <div className="mt-5 space-y-2.5">
            {it.o.map((opt,i)=>{
              let cls='border-navy-900/10 bg-white hover:border-teal/50 hover:bg-teal/[0.03]'; let badge=null;
              if (picked!==null){
                if (i===it.a){cls='border-emerald/60 bg-emerald/[0.07]';badge=<span className="text-emerald"><Icon name="checkCircle" size={20} stroke={2.3}/></span>;}
                else if (i===picked){cls='border-red-300 bg-red-50';badge=<span className="text-red-500"><Icon name="xCircle" size={20} stroke={2.3}/></span>;}
                else cls='border-navy-900/5 bg-white opacity-55';
              }
              return (
                <button key={i} disabled={picked!==null} onClick={()=>pick(i)} className={'quiz-opt w-full flex items-center justify-between gap-3 rounded-2xl border-2 px-4 py-3.5 text-left text-sm font-medium text-navy-900 disabled:cursor-default cursor-pointer '+cls}>
                  <span className="flex items-center gap-3"><span className="grid h-7 w-7 shrink-0 place-items-center rounded-full bg-navy-900/5 text-xs font-bold">{String.fromCharCode(65+i)}</span>{opt}</span>{badge}
                </button>
              );
            })}
          </div>
          {picked!==null && (
            <div className={'anim-scaleIn mt-4 rounded-2xl p-4 '+(picked===it.a?'bg-emerald/10':'bg-amber-50')}>
              <div className={'flex items-center gap-2 font-display font-bold '+(picked===it.a?'text-emerald':'text-amber-600')}><Icon name={picked===it.a?'checkCircle':'xCircle'} size={18} stroke={2.4}/>{picked===it.a?'Benar!':'Kurang tepat'}</div>
              <p className="mt-1.5 text-sm text-navy-800/70">{it.why}</p>
              <button onClick={next} className="mt-3 cursor-pointer inline-flex items-center gap-1.5 rounded-full bg-navy-900 px-5 py-2 text-sm font-bold text-white hover:bg-navy-800 transition">{qi+1<QUIZ_BANK.length?'Lanjut':'Lihat Hasil'} <Icon name="arrowRight" size={15} stroke={2.4}/></button>
            </div>
          )}
        </div>
      );
    }

    function MatchGame() {
      const [terms] = useState(() => shuffle(PAIRS.map(p=>({id:p.id,t:p.t}))));
      const [defs] = useState(() => shuffle(PAIRS.map(p=>({id:p.id,d:p.d}))));
      const [sel, setSel] = useState(null);
      const [matched, setMatched] = useState([]);
      const [wrongId, setWrongId] = useState(null);
      const clickTerm = (id) => { if (matched.includes(id)) return; setSel(id); setWrongId(null); };
      const clickDef = (id) => {
        if (matched.includes(id) || sel===null) return;
        if (sel===id){ setMatched(m=>[...m,id]); setSel(null); }
        else { setWrongId(id); setTimeout(()=>setWrongId(null),420); }
      };
      const allDone = matched.length===PAIRS.length;
      const reset = () => { setMatched([]); setSel(null); setWrongId(null); };
      return (
        <div>
          <div className="flex items-center justify-between">
            <p className="text-sm text-navy-800/60">Klik istilah di kiri, lalu klik definisi yang cocok di kanan.</p>
            <button onClick={reset} className="cursor-pointer inline-flex items-center gap-1.5 text-sm font-semibold text-teal-deep"><Icon name="rotate" size={15} stroke={2.3}/> Ulangi</button>
          </div>
          <div className="mt-5 grid grid-cols-2 gap-4">
            <div className="space-y-2.5">
              {terms.map(t=>{
                const m = matched.includes(t.id);
                return <button key={t.id} disabled={m} onClick={()=>clickTerm(t.id)} className={'w-full rounded-xl border-2 px-4 py-3 text-left text-sm font-bold transition cursor-pointer disabled:cursor-default '+(m?'border-emerald/50 bg-emerald/10 text-emerald':sel===t.id?'border-teal bg-teal/10 text-teal-deep scale-[1.02]':'border-navy-900/10 bg-white text-navy-900 hover:border-teal/40')}>{t.t}</button>;
              })}
            </div>
            <div className="space-y-2.5">
              {defs.map(df=>{
                const m = matched.includes(df.id);
                return <button key={df.id} disabled={m} onClick={()=>clickDef(df.id)} className={'w-full rounded-xl border-2 px-4 py-3 text-left text-sm font-medium transition cursor-pointer disabled:cursor-default '+(m?'border-emerald/50 bg-emerald/10 text-emerald':wrongId===df.id?'border-red-400 bg-red-50 text-red-600 shake':'border-navy-900/10 bg-white text-navy-900 hover:border-teal/40')}>{df.d}</button>;
              })}
            </div>
          </div>
          {allDone && <div className="anim-scaleIn mt-5 rounded-2xl bg-emerald/10 px-5 py-4 text-center font-display font-bold text-emerald">🎉 Sempurna! Semua istilah berhasil dicocokkan.</div>}
        </div>
      );
    }

    function Kuis() {
      const [tab, setTab] = useState('quiz');
      return (
        <section id="kuis" className="relative mx-auto max-w-6xl px-5 py-24 scroll-mt-20">
          <SectionHead pill="Uji Pemahaman" pillIcon="listCheck" title="Saatnya Tes Dirimu"
            sub="Kerjakan kuis pilihan ganda, lalu cocokkan istilah ekonomi digital. Semua memberi umpan balik langsung." />
          <div className="mt-10 max-w-3xl mx-auto">
            <div className="flex gap-2 p-1.5 rounded-2xl bg-navy-900/5 w-fit mx-auto">
              {[['quiz','Kuis Pilihan Ganda','target'],['match','Cocokkan Istilah','listCheck']].map(([id,label,ic])=>(
                <button key={id} onClick={()=>setTab(id)} className={'cursor-pointer inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-sm font-bold transition '+(tab===id?'bg-white text-navy-900 shadow':'text-navy-800/55 hover:text-navy-900')}><Icon name={ic} size={16}/> {label}</button>
              ))}
            </div>
            <Reveal className="mt-6">
              <div className="rounded-3xl bg-white ring-1 ring-navy-900/5 shadow-xl shadow-navy-900/[0.05] p-7">
                {tab==='quiz' ? <QuizGame/> : <MatchGame/>}
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ================= Quiz inside module modal ================= */
    function ModalQuiz({ quiz, accent }) {
      const [picked, setPicked] = useState(null);
      const a = ACCENT[accent];
      const isCorrect = picked === quiz.answer, answered = picked !== null;
      return (
        <div className="mt-2">
          <div className="flex items-center gap-2 text-sm font-semibold text-navy-900"><span className={'grid h-7 w-7 place-items-center rounded-lg '+a.soft+' '+a.text}><Icon name="bulb" size={16}/></span>Kuis Interaktif</div>
          <p className="mt-3 font-display text-lg font-bold text-navy-900 leading-snug">{quiz.q}</p>
          <div className="mt-4 space-y-2.5">
            {quiz.options.map((opt,i)=>{
              let cls='border-navy-900/10 bg-white hover:border-teal/50 hover:bg-teal/[0.03]'; let badge=null;
              if (answered){
                if (i===quiz.answer){cls='border-emerald/60 bg-emerald/[0.07]';badge=<span className="text-emerald"><Icon name="checkCircle" size={20} stroke={2.3}/></span>;}
                else if (i===picked){cls='border-red-300 bg-red-50';badge=<span className="text-red-500"><Icon name="xCircle" size={20} stroke={2.3}/></span>;}
                else cls='border-navy-900/5 bg-white opacity-55';
              }
              return (
                <button key={i} disabled={answered} onClick={()=>setPicked(i)} className={'quiz-opt w-full flex items-center justify-between gap-3 rounded-2xl border-2 px-4 py-3.5 text-left text-sm font-medium text-navy-900 disabled:cursor-default cursor-pointer '+cls}>
                  <span className="flex items-center gap-3"><span className="grid h-7 w-7 shrink-0 place-items-center rounded-full bg-navy-900/5 text-xs font-bold text-navy-800">{String.fromCharCode(65+i)}</span>{opt}</span>{badge}
                </button>
              );
            })}
          </div>
          {answered && (
            <div className={'anim-scaleIn mt-4 rounded-2xl p-4 '+(isCorrect?'bg-emerald/10':'bg-amber-50')}>
              <div className={'flex items-center gap-2 font-display font-bold '+(isCorrect?'text-emerald':'text-amber-600')}><Icon name={isCorrect?'checkCircle':'xCircle'} size={18} stroke={2.4}/>{isCorrect?'Tepat sekali! 🎉':'Belum tepat — coba pahami lagi'}</div>
              <p className="mt-2 text-sm text-navy-800/70 leading-relaxed">{quiz.why}</p>
              {!isCorrect && <button onClick={()=>setPicked(null)} className="mt-3 cursor-pointer inline-flex items-center gap-1.5 text-sm font-semibold text-teal-deep hover:gap-2.5 transition-all"><Icon name="rotate" size={15} stroke={2.3}/> Coba lagi</button>}
            </div>
          )}
        </div>
      );
    }

    function Modal({ module, onClose }) {
      const a = ACCENT[module.accent];
      useEffect(() => {
        const onKey = (e) => e.key==='Escape' && onClose();
        window.addEventListener('keydown', onKey); document.body.style.overflow='hidden';
        return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
      }, []);
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" role="dialog" aria-modal="true">
          <div onClick={onClose} className="absolute inset-0 bg-navy-950/60 backdrop-blur-sm anim-scaleIn"></div>
          <div className="anim-scaleIn relative w-full max-w-lg max-h-[90vh] overflow-y-auto nice-scroll rounded-[1.75rem] bg-ivory shadow-2xl">
            <div className={'relative overflow-hidden bg-gradient-to-br '+a.grad+' px-7 pt-7 pb-8 text-navy-950'}>
              <div className="absolute inset-0 opacity-20" style={{backgroundImage:'radial-gradient(circle at 80% 20%, #fff 0, transparent 40%)'}}></div>
              <button onClick={onClose} aria-label="Tutup" className="absolute right-4 top-4 grid h-9 w-9 place-items-center rounded-full bg-navy-950/15 text-navy-950 hover:bg-navy-950/25 transition cursor-pointer"><Icon name="x" size={18} stroke={2.5}/></button>
              <div className="relative flex items-center gap-4">
                <div className="grid h-14 w-14 place-items-center rounded-2xl bg-navy-950/15"><Icon name={module.icon} size={28} stroke={2.2}/></div>
                <div><div className="text-xs font-bold uppercase tracking-wider opacity-70">Modul {module.no} · {module.tag}</div><h3 className="font-display text-xl font-extrabold leading-tight mt-0.5">{module.title}</h3></div>
              </div>
            </div>
            <div className="px-7 py-6">
              <div className="flex items-center gap-2 text-sm font-semibold text-navy-900"><span className={'grid h-7 w-7 place-items-center rounded-lg '+a.soft+' '+a.text}><Icon name="book" size={16}/></span>Penjelasan Singkat</div>
              <p className="mt-3 text-navy-800/70 leading-relaxed">{module.blurb} Materi ini membantumu memahami konsep inti berikut:</p>
              <ul className="mt-4 space-y-2.5">
                {module.points.map((p,i)=>(<li key={i} className="flex items-start gap-3 text-sm text-navy-900"><span className={'mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-full '+a.soft+' '+a.text}><Icon name="chevR" size={13} stroke={2.6}/></span>{p}</li>))}
              </ul>
              <div className="my-6 h-px bg-gradient-to-r from-transparent via-navy-900/10 to-transparent"></div>
              <ModalQuiz quiz={module.quiz} accent={module.accent}/>
            </div>
          </div>
        </div>
      );
    }

    /* ================= Footer ================= */
    function Footer() {
      return (
        <footer className="bg-navy-950 text-white/50">
          <div className="mx-auto max-w-6xl px-5 py-14">
            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-2.5">
                <div className="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-teal to-emerald text-navy-950"><Icon name="zap" size={18} stroke={2.4}/></div>
                <span className="font-display font-extrabold text-white text-lg">EkonomiDigital<span className="text-teal">.id</span></span>
              </div>
              <div className="flex flex-wrap items-center justify-center gap-2">
                {NAV.map(([id,label])=>(<a key={id} href={'#'+id} className="rounded-full bg-white/5 px-4 py-1.5 text-sm text-white/70 hover:bg-white/10 hover:text-white transition">{label}</a>))}
              </div>
            </div>
            <div className="mt-8 h-px bg-white/10"></div>
            <div className="mt-6 flex flex-col md:flex-row items-center justify-between gap-3 text-sm">
              <p>Media Pembelajaran Ekonomi Digital — Kurikulum Ekonomi SMA</p>
              <p className="flex items-center gap-2"><Icon name="cap" size={16}/> Dibuat untuk tugas UAS · © 2026</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ================= App ================= */
    function App() {
      const [active, setActive] = useState(null);
      const start = () => document.getElementById('materi')?.scrollIntoView({ behavior:'smooth' });
      return (
        <div>
          <Navbar />
          <Hero onStart={start} />
          <main>
            <Materi onOpen={setActive} />
            <VideoSection />
            <Simulasi />
            <Kuis />
          </main>
          <Footer />
          {active && <Modal module={active} onClose={()=>setActive(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
